<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Global SDL Landscape · Map</title>
<link rel="icon" type="image/png" href="sdl_favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

<style>
:root{
  /* v45: dark is default. Light theme overrides below under [data-theme="light"]. */
  --bg:         oklch(0.18 0.01 240);
  --bg-2:       oklch(0.22 0.01 240);
  --bg-3:       oklch(0.26 0.01 240);
  --ink:        oklch(0.94 0.01 85);
  --ink-2:      oklch(0.78 0.01 85);
  --ink-3:      oklch(0.58 0.01 85);
  --ink-4:      oklch(0.42 0.01 240);
  --rule:       oklch(0.32 0.01 240);
  --rule-2:     oklch(0.28 0.01 240);
  --land:       oklch(0.24 0.01 240);
  --land-edge:  oklch(0.32 0.01 240);
  --graticule:  oklch(0.26 0.01 240);

  --c-national:   oklch(0.78 0.14 85);
  --c-academic:   oklch(0.78 0.14 200);
  --c-commercial: oklch(0.72 0.18 25);
  --c-labos:      oklch(0.78 0.14 300);

  --font-sans: 'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;

  /* v45 — overlay / sheet surfaces (formerly hardcoded oklch(0.14 / 0.12 240)). */
  --surface-overlay:    oklch(0.14 0.01 240 / 0.94);
  --surface-deep:       oklch(0.12 0.01 240);
  --surface-hover:      oklch(0.18 0.012 240);
  --globe-gradient-mid: oklch(0.22 0.015 240);
  --globe-gradient-end: oklch(0.14 0.01 240);
}

[data-theme="light"]{
  --bg:         oklch(0.985 0.003 85);
  --bg-2:       oklch(0.965 0.004 85);
  --bg-3:       oklch(0.93  0.005 85);
  --ink:        oklch(0.18  0.01  240);
  --ink-2:      oklch(0.36  0.01  240);
  --ink-3:      oklch(0.52  0.01  240);
  --ink-4:      oklch(0.66  0.01  240);
  --rule:       oklch(0.86  0.005 85);
  --rule-2:     oklch(0.91  0.005 85);
  --land:       oklch(0.93  0.005 85);
  --land-edge:  oklch(0.78  0.005 85);
  --graticule:  oklch(0.88  0.005 85);

  /* Slightly deeper marker colors to keep contrast on warm-white bg */
  --c-national:   oklch(0.58 0.18 85);
  --c-academic:   oklch(0.55 0.18 220);
  --c-commercial: oklch(0.55 0.22 25);
  --c-labos:      oklch(0.55 0.18 300);

  /* v45 — light overlay surfaces (replace dark popup/sheet backgrounds). */
  --surface-overlay:    oklch(0.985 0.005 85 / 0.96);
  --surface-deep:       oklch(0.96 0.005 85);
  --surface-hover:      oklch(0.93 0.006 85);
  --globe-gradient-mid: oklch(0.92 0.005 85);
  --globe-gradient-end: oklch(0.82 0.005 85);
}

*{ box-sizing:border-box; }
html, body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--font-sans); }
body{ min-height:100vh; -webkit-font-smoothing:antialiased; }

/* v45.d — collapsible sidebars as IN-FLOW grid columns (not overlays).
   When open, they look like the previous always-on layout. When closed, the
   map fills the full width. No backdrop, no blur. Both sides toggle
   independently — user can have neither / left only / right only / both. */
#app{
  display:grid;
  grid-template-columns: auto 1fr auto;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header header"
    "left   map    right"
    "footer footer footer";
  gap:0;
  min-height:100vh;
}
aside{
  width: 0;
  padding: 0;
  border: 0;
  overflow: hidden;
  visibility: hidden;            /* v45.e — fully hidden when closed */
  background: var(--bg);
  transition: width .28s cubic-bezier(.2,.8,.2,1),
              padding .28s cubic-bezier(.2,.8,.2,1),
              border-width .28s cubic-bezier(.2,.8,.2,1),
              visibility 0s linear .28s;   /* delay until width settles */
  font-size: 14px;
}
aside.open{
  width: clamp(280px, 22vw, 340px);
  padding: 24px 22px 24px;
  overflow-y: auto;
  visibility: visible;
  transition: width .28s cubic-bezier(.2,.8,.2,1),
              padding .28s cubic-bezier(.2,.8,.2,1),
              border-width .28s cubic-bezier(.2,.8,.2,1),
              visibility 0s linear 0s;
}
aside.left.open{ border-right: 1px solid var(--rule); }
aside.right.open{ border-left: 1px solid var(--rule); }
/* v45.e — pull-tab buttons. Edge-anchored vertical handles that invite a
   pull-out gesture. Mobile reverts to floating pill style (overrides below). */
.mob-toggle{
  position:fixed;
  top: 50%;
  z-index:55;
  background:var(--surface-overlay);
  border:1px solid var(--rule);
  color:var(--ink);
  padding: 14px 8px;
  font-family:var(--font-sans);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  cursor:pointer;
  box-shadow: 0 4px 18px rgba(0,0,0,0.18);
  min-width: 32px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  transition: background .15s, border-color .15s, transform .15s,
              left .28s cubic-bezier(.2,.8,.2,1),
              right .28s cubic-bezier(.2,.8,.2,1);
}
.mob-toggle .chev{ font-size:14px; line-height:1; transition: transform .25s; }
.mob-toggle .lbl{
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  white-space: nowrap;
}
.mob-toggle:hover{ border-color: var(--ink-3); background: var(--bg-3); }
.mob-toggle:active{ transform: translateY(-50%) scale(.95); }
/* v45.g — when a marker tip is showing, pull-tabs become pointer-transparent
   so a click on top of them routes to the hovered marker instead of opening
   the drawer. Fixes UK ARIA / DP Technology and any other marker that
   projects close to the viewport edge. */
/* v45.ag — desktop-only. On touch the marker-hovered class is set on tap
   and never cleared (no pointermove on empty area), which left the pull-
   tabs permanently dead after the first pin interaction. */
body.marker-hovered:not(.is-touch) .mob-toggle{ pointer-events: none; }
.mob-toggle.left{
  left: 0; transform: translateY(-50%);
  border-left: 0;
  border-radius: 0 14px 14px 0;
  padding-left: 6px;
}
.mob-toggle.right{
  right: 0; transform: translateY(-50%);
  border-right: 0;
  border-radius: 14px 0 0 14px;
  padding-right: 6px;
}
.mob-toggle.left:hover{ transform: translateY(-50%) translateX(2px); }
.mob-toggle.right:hover{ transform: translateY(-50%) translateX(-2px); }
/* Chevron orientation: pointing INTO the map when closed (invites pull),
   pointing OUT toward the edge when open (offers to close). */
body:not(.left-open)  .mob-toggle.left  .chev::before { content: '\25B6'; } /* ▶ */
body.left-open        .mob-toggle.left  .chev::before { content: '\25C0'; } /* ◀ */
body:not(.right-open) .mob-toggle.right .chev::before { content: '\25C0'; } /* ◀ */
body.right-open       .mob-toggle.right .chev::before { content: '\25B6'; } /* ▶ */
/* When a side is open the tab follows the sidebar edge. */
body.left-open  .mob-toggle.left  { left: clamp(280px, 22vw, 340px); }
body.right-open .mob-toggle.right { right: clamp(280px, 22vw, 340px); }
.mob-toggle .badge{
  position: absolute; top: -6px; right: -6px;
  background:var(--c-commercial); color:#fff;
  font-size:10px; padding: 1px 5px; border-radius:10px;
  min-width:14px; text-align:center;
}
/* Drawer close X kept for in-sidebar close affordance. */
.drawer-close{
  position:absolute; top:12px; right:12px;
  width:32px; height:32px;
  background:var(--bg-2); border:1px solid var(--rule);
  color:var(--ink); border-radius:6px; font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
/* Backdrop was previously dim+blur; v45.d removes it entirely. */
.drawer-backdrop{ display:none !important; }

/* Header */
header.top{
  grid-area:header;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:22px 28px 18px;
  border-bottom:1px solid var(--rule);
  gap:40px;
}
.brand-lockup{ display:flex; align-items:center; gap:22px; min-width:0; }
.tue-logo{ display:flex; align-items:center; flex-shrink:0; }
.tue-logo img{ height:38px; width:auto; display:block;
  /* TU/e red on dark: keep the brand red. On light: still red — good contrast. */
}
.brand-lockup::after{
  content:""; display:none;
  /* Spacer kept in case we want a hairline divider later */
}
.header-right{ display:flex; align-items:center; gap:24px; }
.theme-toggle{
  appearance:none; background:var(--bg-2); color:var(--ink);
  border:1px solid var(--rule); border-radius:8px;
  width:40px; height:40px; padding:0;
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:color .15s ease, border-color .15s ease, background .15s ease, transform .12s ease;
}
.theme-toggle:hover{ color:var(--ink); border-color:var(--ink-2); background:var(--bg-3); }
.theme-toggle:active{ transform:scale(0.94); }
.theme-toggle svg{ width:20px; height:20px; }
.theme-toggle .ico-sun{ display:none; }
[data-theme="light"] .theme-toggle .ico-moon{ display:none; }
[data-theme="light"] .theme-toggle .ico-sun{ display:inline; }
.brand .eyebrow{
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:0.22em; text-transform:uppercase; margin-bottom:6px;
}
.brand h1{
  font-family:var(--font-sans); font-weight:600; font-size:28px; letter-spacing:-0.01em;
  margin:0; color:var(--ink);
}
.brand h1 .dim{ color:var(--ink-3); font-weight:400; }

.counts{
  display:flex; gap:28px; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  letter-spacing:0.1em;
}
.counts .n{ color:var(--ink); font-size:22px; font-weight:500; letter-spacing:0; display:block; font-variant-numeric:tabular-nums; }
.counts .lbl{ text-transform:uppercase; }

/* Sidebars */
aside{
  padding:24px 22px 24px;
  border-right:1px solid var(--rule);
  overflow-y:auto;
  max-height:calc(100vh - 150px);
}
aside.right{ border-right:0; border-left:1px solid var(--rule); grid-area:right; }
aside.left{ grid-area:left; }

.section-h{
  font-family:var(--font-mono); font-size:10px; color:var(--ink-3);
  letter-spacing:0.22em; text-transform:uppercase;
  margin:22px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--rule-2);
}
.section-h:first-child{ margin-top:0; }

/* Filter chips */
.chips{ display:flex; flex-direction:column; gap:4px; }
.chip{
  display:flex; align-items:center; gap:10px;
  padding:7px 10px; border-radius:3px;
  background:transparent; border:1px solid transparent;
  cursor:pointer; font-family:var(--font-sans); font-size:13px; color:var(--ink-2);
  text-align:left; width:100%;
  transition: background .12s, color .12s, border-color .12s;
}
.chip:hover{ background:var(--bg-2); color:var(--ink); }
.chip.active{
  background:var(--bg-2); border-color:var(--rule); color:var(--ink);
}
.chip .dot{
  width:8px; height:8px; border-radius:50%; background:var(--ink-4); flex:0 0 auto;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3) inset;
}
.chip.active .dot{ box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px currentColor; }
.chip .n{
  margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  font-variant-numeric:tabular-nums;
}
.chip.dim{ opacity:0.5; }

.chip[data-tier="national"]   .dot{ background:var(--c-national); }
.chip[data-tier="academic"]   .dot{ background:var(--c-academic); }
.chip[data-tier="commercial"] .dot{ background:var(--c-commercial); }
.chip[data-tier="labos"]      .dot{ background:var(--c-labos); }

.legend-row{
  display:flex; align-items:center; gap:10px; padding:5px 0;
  font-size:12px; color:var(--ink-2);
}
.legend-row .sw{ width:12px; height:12px; border-radius:50%; }

/* Reset button */
.reset-btn{
  width:100%; margin-top:8px;
  padding:8px 10px; background:transparent;
  border:1px solid var(--rule); color:var(--ink-2);
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; border-radius:2px;
}
.reset-btn:hover{ background:var(--bg-2); color:var(--ink); }

/* Map */
.map-wrap{
  grid-area:map;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse 80% 70% at 50% 45%, oklch(0.22 0.01 240) 0%, var(--bg) 80%);
}
#map{ width:100%; height:100%; display:block; touch-action:none; user-select:none; }
.map-wrap svg{ width:100%; height:100%; display:block; }

/* v45 — globe gradient stops driven by CSS variables (theme-aware).
   The SVG <stop> stop-color attribute is set once via innerHTML, but a
   stop-color CSS rule wins over the attribute, so we override here per theme. */
#globeFill stop:nth-child(1){ stop-color: oklch(0.30 0.02 230); }
#globeFill stop:nth-child(2){ stop-color: var(--globe-gradient-mid); }
#globeFill stop:nth-child(3){ stop-color: var(--globe-gradient-end); }
[data-theme="light"] #globeFill stop:nth-child(1){ stop-color: oklch(0.96 0.01 235); }
.graticule{ fill:none; stroke:var(--graticule); stroke-width:0.5; opacity:0.5; vector-effect:non-scaling-stroke; }
.sphere{ fill:none; stroke:var(--rule); stroke-width:1; vector-effect:non-scaling-stroke; }
.sphere-fill{ pointer-events:none; }
.atmosphere{ pointer-events:none; }
.specular{ pointer-events:none; }
.land{ fill:var(--land); stroke:none; vector-effect:non-scaling-stroke; transition: opacity .3s; }
.filtering .land{ opacity:0.5; }
.filtering .graticule{ opacity:0.2; }
.borders{ fill:none; stroke:oklch(0.32 0.01 240); stroke-width:0.5; opacity:0.9; vector-effect:non-scaling-stroke; stroke-linejoin:round; }
.borders-outer{ fill:none; stroke:oklch(0.40 0.01 240); stroke-width:0.7; vector-effect:non-scaling-stroke; stroke-linejoin:round; }
.provinces{
  fill:none; stroke:oklch(0.30 0.01 240); stroke-width:0.4;
  vector-effect:non-scaling-stroke; stroke-linejoin:round;
  stroke-dasharray: 2 2;
  opacity:0; transition: opacity .35s;
  pointer-events:none;
}
.country-label{
  font-family:var(--font-mono); font-weight:500;
  font-size:8px; fill:var(--ink-3); opacity:0;
  letter-spacing:0.18em; pointer-events:none;
  transition: opacity .35s;
  /* v45: stroke removed — conflicted with the SDL marker-label halo and
     made the map read noisy. Plain fill reads cleanly on both themes. */
  stroke: none;
}
.country-label[data-tier="1"]{ font-size:8.5px; fill:var(--ink-2); letter-spacing:0.2em; }
.country-label[data-tier="2"]{ font-size:7.5px; fill:var(--ink-3); }
.country-label[data-tier="3"]{ font-size:7px; fill:var(--ink-3); opacity:0.7; }

.province-label{
  font-family:var(--font-mono); font-weight:400;
  font-size:8px; fill:var(--ink-3); opacity:0;
  letter-spacing:0.06em; pointer-events:none;
  transition: opacity .35s;
  /* v45: stroke removed (see .country-label note). */
  stroke: none;
}

/* Markers */
/* v45: pointer-events disabled on individual markers — hover/click is
   routed centrally via pickMarkerFromEvent (precise nearest-by-screen-distance,
   fixes wrong-marker selection in clusters). */
.marker{ cursor:pointer; transition: opacity .2s; pointer-events:none; }
/* v45 leader line — drawn from dot to displaced label when the label couldn't
   fit at any anchor close to its marker. Subtle so it doesn't add clutter. */
.sdl-leader{ stroke: var(--ink-3); stroke-width: 0.5; opacity: 0.45;
  pointer-events: none; vector-effect: non-scaling-stroke; }
/* v45.j — labels are now clickable. Routes to their owning marker via
   pickMarkerFromEvent extension. Same cursor + hover hint as markers. */
.sdl-label{ pointer-events: visiblePainted; cursor: pointer; }
/* v45.h — keyboard-focused marker. Gentle, subtle: a second ring outside the
   normal one, slowly pulsing in opacity. The marker itself stays the same
   color, so it doesn't shout. */
.marker.kbd-focus .ring{ stroke-width: 1.6; opacity: 0.85; }
.marker.kbd-focus::after{ /* not actually rendered for SVG; placeholder */ }
.marker .kbd-halo{ display: none; }
.marker.kbd-focus .kbd-halo{
  display: inline;
  fill: none;
  stroke: currentColor;
  stroke-width: 0.8;
  opacity: 0.7;
  vector-effect: non-scaling-stroke;
  animation: kbd-pulse 1.6s ease-in-out infinite;
}
@keyframes kbd-pulse{
  0%, 100% { opacity: 0.35; }
  50%      { opacity: 0.95; }
}
.kbd-hint{
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-3);
  background: var(--surface-overlay);
  padding: 6px 14px; border-radius: 14px; border: 1px solid var(--rule);
  z-index: 80; pointer-events: none;
  opacity: 0; transition: opacity .35s ease .15s;
}
/* v45.k — hint shows whenever a card is open. Subtle (0.65), fades in
   after a small delay so it doesn't appear instantly. */
body.marker-hovered .kbd-hint{ opacity: 0.65; }
/* v45.ae — hint is keyboard-only guidance; touch users have no arrow
   keys to cycle, so suppress on touch devices entirely. */
body.is-touch .kbd-hint{ display: none !important; }
.marker .ring{ fill:none; stroke:currentColor; stroke-width:1; opacity:0.4; }
.marker .core{ fill:currentColor; }
.marker.dim{ opacity:0.08; pointer-events:none; }
.marker.dim .ring{ opacity:0; }
.marker.dim .core{ r:2; }

.marker.hl{
  /* v34: SVG-native filter for iOS reliability. The CSS drop-shadow path
     stopped rendering on iOS once .pulse got GPU-promoted by its animation —
     iOS WebKit detaches the parent <g>'s filter when a descendant becomes
     a compositing layer. Filter primitives inside an SVG <filter> element
     survive that. */
  filter: url(#pinGlow);
}
.marker.hl .core{ filter: brightness(1.4); }
.marker.hl .ring{ opacity:0.8; stroke-width:1.5; }
.marker.hl .pulse,
.marker.selected .pulse {
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5px;
  /* base r set in JS at init (r=6) since not all browsers honour 'r' CSS prop */
  transform-box: fill-box;       /* reference box = circle's own bbox */
  transform-origin: center;      /* radial expansion from circle centre (iOS-strict) */
  animation: pulse 1.8s ease-out infinite;
  will-change: transform, opacity;
}
@keyframes pulse {
  0%   { transform: scale(1);   opacity: 0.85; }
  100% { transform: scale(4.7); opacity: 0;    }
}

.marker-label{
  font-family:var(--font-mono); font-size:9.5px; fill:var(--ink-2);
  pointer-events:none; letter-spacing:0.02em;
  text-shadow: 0 0 4px var(--bg), 0 0 4px var(--bg);
}

/* Tooltip */
.tip{
  position:absolute; pointer-events:none;
  background:var(--surface-overlay);
  border:1px solid var(--rule);
  border-radius:3px;
  padding:12px 14px;
  min-width:260px; max-width:320px;
  color:var(--ink);
  backdrop-filter:blur(6px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  opacity:0; transition: opacity .14s;
  z-index:20;
  font-size:12px;
}
.tip.show{ opacity:1; }
.tip .t-head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.tip .t-dot{ width:10px; height:10px; border-radius:50%; }
.tip .t-name{ font-weight:600; font-size:14px; line-height:1.2; }
.tip .t-meta{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
.tip .t-row{ display:flex; justify-content:space-between; gap:14px; padding:3px 0; color:var(--ink-2); }
.tip .t-row .k{ color:var(--ink-3); font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; }
.tip .t-row .v{ text-align:right; }

/* Right rail: active highlight list */
.list{ display:flex; flex-direction:column; gap:0; }
.list-item{
  padding:10px 4px; border-bottom:1px solid var(--rule-2);
  display:grid; grid-template-columns: 14px 1fr auto; gap:10px; align-items:start;
  cursor:pointer;
}
.list-item:hover{ background:var(--bg-2); }
.list-item .ldot{ width:8px; height:8px; border-radius:50%; margin-top:6px; }
.list-item .lname{ font-size:13px; color:var(--ink); font-weight:500; line-height:1.25; }
.list-item .lmeta{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3); letter-spacing:0.04em; margin-top:2px; }
.list-item .lcountry{ font-family:var(--font-mono); font-size:10.5px; color:var(--ink-2); letter-spacing:0.04em; }

/* Footer */
footer.bot{
  grid-area:footer;
  padding:12px 28px;
  border-top:1px solid var(--rule);
  display:flex; justify-content:space-between; align-items:center;
  font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3);
  letter-spacing:0.12em; text-transform:uppercase;
}
footer .leg{ display:flex; gap:20px; align-items:center; }

footer .ident { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
footer .ident .sep { opacity:0.5; }
footer .ident a.author { color: var(--ink-2); text-decoration:none; border-bottom: 1px dotted var(--ink-3); }
footer .ident a.author:hover { color: var(--ink); border-bottom-color: var(--ink); border-bottom-style: solid; }

.empty{

/* Zoom controls */
.zoom-ctl{
  position:absolute; top:16px; right:16px; z-index:10;
  display:flex; flex-direction:column; gap:4px;
  background:var(--surface-overlay);
  border:1px solid var(--rule); border-radius:4px;
  padding:4px;
  backdrop-filter:blur(4px);
}
.zoom-ctl button{
  width:32px; height:32px; padding:0;
  background:transparent; border:0;
  color:var(--ink-2); cursor:pointer;
  font-family:var(--font-mono); font-size:18px; line-height:1;
  border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  transition:background .12s, color .12s;
}
.zoom-ctl button:hover{ background:var(--bg-3); color:var(--ink); }
.zoom-ctl button:active{ background:var(--bg-2); }
.zoom-ctl button + button{ border-top:1px solid var(--rule-2); }
.zoom-ctl #z-reset{ font-size:15px; }

/* Region navigation buttons — overlaid on the map, below zoom controls */
.region-nav{
  position:absolute; top:140px; right:16px; z-index:20;
  display:flex; flex-direction:column; gap:4px;
}
.region-nav button{
  padding:6px 10px;
  background:var(--surface-overlay);
  border:1px solid var(--rule);
  color:var(--ink-2); cursor:pointer;
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  letter-spacing:0.08em; text-transform:uppercase;
  border-radius:3px;
  backdrop-filter:blur(4px);
  transition:background .15s, color .15s, border-color .15s;
}
.region-nav button:hover{ background:var(--bg-3); color:var(--ink); border-color:var(--ink-3); }
.region-nav button.active-region{ border-color:var(--accent); color:var(--accent); }

/* Filter callout — contextual annotation on the map */
.filter-callout{
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:var(--font-mono); font-size:11px; color:var(--ink-2);
  letter-spacing:0.04em; line-height:1.5;
  padding:8px 16px; border:1px solid var(--accent); border-radius:3px;
  background:var(--surface-overlay); backdrop-filter:blur(6px);
  max-width:520px; text-align:center;
  pointer-events:none; z-index:25;
  opacity:0; transition:opacity .4s;
}
.filter-callout.visible{ opacity:1; }
.filter-callout strong{ color:var(--accent); }

.zoom-hint{
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3);
  letter-spacing:0.14em; text-transform:uppercase;
  padding:6px 14px; border:1px solid var(--rule-2); border-radius:2px;
  background:var(--surface-overlay); backdrop-filter:blur(4px);
  pointer-events:none; transition:opacity .5s;
}

/* v8: ensure pin taps always fire on touch */
.marker, .marker .hit {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.marker { pointer-events: all !important; }
.marker.dim .hit { pointer-events: none; }

/* v9: hide expensive layers during interaction for smoother drag/pinch */
/* v18: only hide the genuinely heavy graticule + provinces during interaction
   so the user doesn't see country-name pop-in/pop-out lag.
   Labels stay visible during drag; their positions update every frame. */
/* v20: instant hide for graticule/provinces — no transition causes faster first frame */
body.interacting .graticule,
body.interacting .provinces { opacity: 0; }
body.interacting .marker-label { visibility: hidden; }
body.interacting .land { opacity: 0.92; }
/* Pre-warm GPU layers so the first touch doesn't pay layer-promotion cost */
.land, .borders, .graticule, .provinces, #markers, #map {
  will-change: opacity, transform;
  transform: translateZ(0);
}
/* Container hint to keep the whole SVG on its own compositing layer */
.map-wrap { transform: translateZ(0); will-change: transform; }
/* GPU compositing hint */
.map-wrap, #map { will-change: transform; }

.sheet-links ul.sources a {
  color: var(--ink-2); font-size: 12px; text-decoration: none;
  font-family: var(--font-mono); word-break: break-all;
  border-bottom: 1px dotted var(--rule);
}
.sheet-links ul.sources a:hover { color: var(--ink); border-bottom-style: solid; }
.sheet-links .note { color: var(--ink-3); font-size: 11.5px; font-style: italic; margin-top: 6px; }

/* v35 desktop card: same DOM, repositioned as a right-side card on wide viewports
   instead of bottom sheet. Sits above the legend without crowding it. */
@media (min-width: 901px) {
  .sheet {
    display: block;
    left: auto; right: 24px; bottom: auto;
    top: 96px;
    width: 360px;
    max-height: calc(100vh - 140px);
    border-radius: 12px;
    border: 1px solid var(--rule);
    box-shadow: 0 20px 48px rgba(0,0,0,0.55);
    transform: translateX(420px);   /* off-screen right */
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  .sheet.open { transform: translateX(0); opacity: 1; pointer-events: auto; }
  .sheet-handle { display: none; }   /* no swipe-down on desktop */
  .sheet-body { padding: 18px 22px 24px; }
  .sheet-head .s-name { font-size: 18px; }
  body.sheet-open .tip { display: none !important; }   /* hide hover tip when card open */
}
@media (max-width: 900px) {
  .sheet { display: block; }
  .tip { display: none !important; }
  /* Bottom-sheet backdrop reuses the drawer backdrop pattern */
  body.sheet-open .drawer-backdrop { display: block !important; z-index: 100; }
  /* When sheet is open, push zoom controls up so they're not hidden */
  body.sheet-open .zoom-ctl,
  body.sheet-open .region-nav {
    transform: translateY(-72vh);
    transition: transform 0.32s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  /* Selected pin highlight: brighter ring + glow + pulse (matches desktop .hl) */
  .marker.selected {
    filter: url(#pinGlow);
  }
  .marker.selected .ring {
    opacity: 1;
    stroke-width: 1.8;
  }
  .marker.selected .core {
    filter: brightness(1.5);
  }
  .marker.selected .pulse {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    transform-box: fill-box;
    transform-origin: center;
    animation: pulse 1.8s ease-out infinite;
    will-change: transform, opacity;
  }
}

/* v22 CANVAS: render heavy geometry on a 2D canvas behind the SVG */
.map-wrap { position: relative; }
#map-canvas {
  position: absolute;
  left: 0; top: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  display: block;
}
#map { position: relative; z-index: 1; background: transparent; }
/* Hide the SVG nodes we no longer paint — canvas renders them now */
.atmosphere, .sphere-fill, .specular, .graticule, .land, .borders, .borders-outer, .provinces {
  display: none !important;
}


/* v23: lock body gestures so the globe's drag/pinch don't bleed into page-level
   scroll/zoom on iOS Safari. Inner scrollable areas (drawers, sheet) opt back in. */
html, body {
  touch-action: none !important;
  overflow: hidden !important;
  overscroll-behavior: none !important;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}
#app {
  touch-action: none;
  height: 100dvh;
  overflow: hidden;
}
.map-wrap, #map-canvas, #map {
  touch-action: none !important;
}
aside.left, aside.right, .sheet, .sheet-body {
  touch-action: pan-y;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}


/* v24: SDL name labels at high zoom (added per-marker on init, shown when k >= 3.0) */
.sdl-label {
  font-family: var(--font-sans);
  font-weight: 600;
  /* v45.z — REMOVED hard-coded font-size. CSS overrode the SVG font-size
     attribute that the redraw was setting per frame, so every bump v45.n
     → v45.y was changing the placement math but not the render. The JS
     redraw sets font-size as an attribute (CSS-px-targeted) and that's
     what we actually want to render. */
  fill: var(--ink);
  /* v45.n — white halo removed; rely on font weight + subtle text-shadow
     for separation against land/ocean. paint-order kept harmless. */
  paint-order: stroke;
  stroke: none;
  stroke-width: 0;
  /* very soft contrast aura via SVG paint-order; no visible border */
  pointer-events: visiblePainted;
  cursor: pointer;
  letter-spacing: 0.005em;
}
@media (max-width: 900px) {
  .marker-label:not(.sdl-label) { display: none; }
  .sdl-label { font-weight: 700; }
}
/* v45: SDL labels stay visible during pan/pinch (never blink on interaction). */
/* body.interacting .sdl-label { visibility: hidden; } */


/* ============================================================
   v25 ANTISLOP DESIGN PASS — tokenize, unify, restrain
   Replaces the chaotic 17-font-size, 8-radius, 6-weight cascade
   with a clear hierarchy. Use the tokens below for new code.
   ============================================================ */
:root {
  /* Type scale — 5 sizes only, ~1.25 ratio */
  --t-micro: 11px;    /* mono labels, eyebrows */
  --t-small: 13px;    /* meta, secondary text */
  --t-body:  15px;    /* default body text */
  --t-head:  18px;    /* subheads, drawer titles */
  --t-title: 22px;    /* primary titles */
  --t-display: 28px;  /* display numbers (counts) */
  /* Weight scale — 3 weights only */
  --w-regular: 400;
  --w-medium:  500;
  --w-strong:  600;
  /* Radius — 3 only */
  --r-tight: 4px;     /* chips, inline pills */
  --r-soft:  8px;     /* buttons, list rows, controls */
  --r-loose: 14px;    /* sheets, drawers, FABs */
  /* Spacing — 4/8/12/16/24/32 */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  /* Shadow — 2 elevations */
  --shadow-1: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-2: 0 8px 28px rgba(0,0,0,0.45);
}

/* === Title bar === */
@media (max-width: 900px) {
  header.top {
    min-height: 56px;
    padding: var(--s-3) 56px;
  }
  .brand h1 {
    font-size: var(--t-head) !important;
    font-weight: var(--w-strong);
    letter-spacing: -0.005em;
  }
  .brand .eyebrow {
    font-size: var(--t-micro);
    letter-spacing: 0.18em;
  }
}
@media (max-width: 480px) {
  .brand h1 { font-size: 17px !important; }
  .brand .eyebrow { display: none; }
}

/* === Header icon buttons === */
@media (max-width: 900px) {
  .mob-toggle {
    width: 44px !important;
    height: 44px !important;
    font-size: var(--t-title) !important;
    border-radius: var(--r-soft) !important;
  }
  .mob-toggle .badge {
    font-size: 10px;
    border-radius: var(--r-tight);
    background: var(--accent);
    color: var(--bg);
    padding: 1px 5px;
    font-weight: var(--w-strong);
  }
}

/* === Drawers === */
@media (max-width: 900px) {
  aside.left, aside.right {
    width: 86vw;
    max-width: 380px;
    padding: var(--s-5) var(--s-5) var(--s-6);
    box-shadow: var(--shadow-2);
    font-size: var(--t-body);
  }
  .section-h {
    font-size: var(--t-small);
    font-weight: var(--w-strong);
    letter-spacing: 0.16em;
    margin: var(--s-5) 0 var(--s-3);
    color: var(--ink-2);
  }
  .section-h:first-child { margin-top: 0; }
  .chip {
    padding: var(--s-3) var(--s-3);
    font-size: var(--t-body);
    font-weight: var(--w-regular);
    min-height: 48px;
    border-radius: var(--r-soft) !important;
    gap: var(--s-3);
  }
  .chip.active {
    font-weight: var(--w-medium);
  }
  .chip .n {
    font-size: var(--t-small);
    color: var(--ink-3);
    font-weight: var(--w-medium);
  }
  .reset-btn {
    margin-top: var(--s-3);
    padding: var(--s-3) var(--s-4);
    font-size: var(--t-small);
    font-weight: var(--w-strong);
    letter-spacing: 0.16em;
    min-height: 48px;
    border-radius: var(--r-soft);
    text-transform: uppercase;
  }
  /* Selected list items in right drawer */
  .list-item {
    padding: var(--s-3) var(--s-1);
    min-height: 56px;
    gap: var(--s-3);
  }
  .list-item .lname {
    font-size: var(--t-body);
    font-weight: var(--w-strong);
    line-height: 1.3;
  }
  .list-item .lmeta, .list-item .lcountry {
    font-size: var(--t-small);
    color: var(--ink-3);
    margin-top: 2px;
  }
  /* Drawer close button */
  .drawer-close {
    width: 36px;
    height: 36px;
    font-size: var(--t-head);
    border-radius: var(--r-soft);
    background: var(--bg-2);
    border: 1px solid var(--rule);
  }
}

/* === Bottom sheet === */
@media (max-width: 900px) {
  .sheet {
    border-top-left-radius: var(--r-loose);
    border-top-right-radius: var(--r-loose);
    box-shadow: var(--shadow-2);
  }
  .sheet-body { padding: var(--s-2) var(--s-5) var(--s-6); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    margin: var(--s-3) auto var(--s-2);
    background: var(--ink-3);
    opacity: 0.5;
    border-radius: 2px;
  }
  .sheet-head {
    margin: var(--s-2) 0 var(--s-2);
    gap: var(--s-3);
  }
  .sheet-head .s-name {
    font-size: var(--t-head);
    font-weight: var(--w-strong);
    line-height: 1.2;
  }
  .sheet-meta {
    font-size: var(--t-micro);
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: var(--s-2) 0 var(--s-4);
  }
  .sheet-row {
    padding: var(--s-3) 0;
    gap: var(--s-4);
    border-bottom: 1px solid var(--rule-2);
  }
  .sheet-row .k {
    font-size: var(--t-micro);
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sheet-row .v {
    font-size: var(--t-body);
    color: var(--ink);
  }
  .sheet-close {
    width: 32px;
    height: 32px;
    border-radius: var(--r-soft);
    font-size: var(--t-title);
  }
}

/* === Map controls (zoom + region nav) === */
@media (max-width: 900px) {
  .zoom-ctl {
    bottom: var(--s-4) !important;
    right: var(--s-4) !important;
    padding: var(--s-1);
    border-radius: var(--r-soft);
    background: var(--surface-overlay);
    border: 1px solid var(--rule);
    box-shadow: var(--shadow-1);
  }
  .zoom-ctl button {
    width: 44px !important;
    height: 44px !important;
    font-size: var(--t-head) !important;
    border-radius: var(--r-tight);
  }
  .zoom-ctl #z-reset { font-size: 16px !important; }
  .region-nav {
    bottom: 168px !important;
    right: var(--s-4) !important;
    gap: var(--s-1);
  }
  .region-nav button {
    min-width: 44px;
    min-height: 36px;
    padding: var(--s-2) var(--s-3) !important;
    font-size: var(--t-micro) !important;
    font-weight: var(--w-strong);
    letter-spacing: 0.12em;
    border-radius: var(--r-tight);
    background: var(--surface-overlay);
    box-shadow: var(--shadow-1);
  }
}

/* === Tooltip (desktop only — keep clean) === */
.tip {
  border-radius: var(--r-soft);
  padding: var(--s-3) var(--s-4);
  font-size: var(--t-small);
  box-shadow: var(--shadow-2);
}
.tip .t-name { font-size: var(--t-body); font-weight: var(--w-strong); }
.tip .t-meta { font-size: var(--t-micro); letter-spacing: 0.1em; }
.tip .t-row .k { font-size: var(--t-micro); }
.tip .t-row .v { font-size: var(--t-small); }

</style>

  // Chips

    .scale(BASE_SCALE)
    .translate([CX, CY])
    .clipAngle(90)
    .rotate([-5, -50]);
  const path = d3.geoPath(projection);

  // === v22 CANVAS SETUP ===
  const _canvas = document.getElementById('map-canvas');
  const _ctx = _canvas.getContext('2d', { alpha: true, desynchronized: true });
  // d3 path generator with canvas context (renders to ctx when called)
  const _pathC = d3.geoPath(projection, _ctx);
  let _dpr = window.devicePixelRatio || 1;
  function _resizeCanvas(){
    const rect = _canvas.parentElement.getBoundingClientRect();
    _dpr = window.devicePixelRatio || 1;
    _canvas.width  = Math.max(1, Math.round(rect.width  * _dpr));
    _canvas.height = Math.max(1, Math.round(rect.height * _dpr));
    // Match SVG's preserveAspectRatio="xMidYMid meet": uniform scale that fits,
    // then center the 1000×560 viewBox inside the canvas pixels
    const s = Math.min(rect.width / 1000, rect.height / 560) * _dpr;
    const offsetX = (_canvas.width  - 1000 * s) / 2;
    const offsetY = (_canvas.height -  560 * s) / 2;
    _ctx.setTransform(s, 0, 0, s, offsetX, offsetY);
  }
  _resizeCanvas();
  window.addEventListener('resize', _resizeCanvas);

    if (isNaN(view.rotate[0]) || isNaN(view.rotate[1]) || isNaN(view.scale)) {
      view.rotate[0] = isFinite(view.rotate[0]) ? view.rotate[0] : 0;

    const isInteracting = document.body.classList.contains('interacting');

      _ctx.arc(CX, CY, r + 30, 0, Math.PI * 2);
      _ctx.fill();

    {

      grad.addColorStop(0, COL_OCEAN_MID);
      grad.addColorStop(1, COL_OCEAN_END);
      _ctx.fillStyle = grad;
      _ctx.beginPath();
      _ctx.arc(CX, CY, r, 0, Math.PI * 2);
      _ctx.fill();

  // v45.m — SPATIAL directional pin navigation. Pressing ← moves to the
  // closest pin to the LEFT of the current selection (in screen-space),
  // → goes right, ↑ goes up, ↓ goes down. Score = perpendicular drift × 2
  // + main-axis distance, so we prefer the most "straight ahead" neighbour
  // rather than the absolute closest by Euclidean distance. If no pin in
  // that direction, wraps to the farthest pin in the opposite direction —
  // snake-like coverage of the visible cluster.
  // v45.o — spatialPick now walks the FULL data array, projecting each pin
  // live, so high zoom (where many pins fall out of __sdlLastVisible) still
  // has neighbours to walk through. Pins on the far side of the globe are
  // skipped (projection returns NaN). The chosen pin is then panned into
  // view by flyToPin() below.
  function projectLive(d){
    // projection is the d3 orthographic in scope; returns [x, y] in viewBox
    // coords or NaN/undef for the back of the globe.
    const p = projection([d.lon, d.lat]);
    if (!p || isNaN(p[0]) || isNaN(p[1])) return null;
    return p;
  }
  function spatialPick(anchor, direction){
    if (!anchor) return null;
    const list = DATA;                       // ALL pins, not just on-screen
    const aProj = projectLive(anchor) || [anchor._x, anchor._y];
    const ax = aProj[0], ay = aProj[1];
    let best = null, bestScore = Infinity;
    function score(dx, dy, dir){
      let main, perp;
      if (dir === 'left')       { if (dx >= -2) return null; main = -dx; perp = Math.abs(dy); }
      else if (dir === 'right') { if (dx <=  2) return null; main =  dx; perp = Math.abs(dy); }
      else if (dir === 'up')    { if (dy >= -2) return null; main = -dy; perp = Math.abs(dx); }
      else                       { if (dy <=  2) return null; main =  dy; perp = Math.abs(dx); }
      return perp * 2 + main;
    }
    for (const d of list) {
      if (d === anchor) continue;
      const p = projectLive(d);
      if (!p) continue;                      // back of globe
      const s = score(p[0] - ax, p[1] - ay, direction);
      if (s != null && s < bestScore) { bestScore = s; best = d; }
    }
    if (best) return best;
    // Wrap: pick the FARTHEST pin in the opposite direction (so a right
    // press after the rightmost pin loops to the leftmost — snake).
    const opposite = { left:'right', right:'left', up:'down', down:'up' }[direction];
    let farBest = null, farScore = -Infinity;
    for (const d of list) {
      if (d === anchor) continue;
      const p = projectLive(d);
      if (!p) continue;
      const dx = p[0] - ax, dy = p[1] - ay;
      let main, perp;
      if (opposite === 'left')       { if (dx >= -2) continue; main = -dx; perp = Math.abs(dy); }
      else if (opposite === 'right') { if (dx <=  2) continue; main =  dx; perp = Math.abs(dy); }
      else if (opposite === 'up')    { if (dy >= -2) continue; main = -dy; perp = Math.abs(dx); }
      else                            { if (dy <=  2) continue; main =  dy; perp = Math.abs(dx); }
      const s = main - perp * 1.5;
      if (s > farScore) { farScore = s; farBest = d; }
    }
    return farBest;
  }
  // v45.o — gently pan the globe so the picked pin sits near screen centre.
  // Only fires when the pin is outside the visible viewBox (i.e. arrow
  // navigation crossed an edge or jumped to the back of the globe).
  let _flyToPinRaf = null;
  function flyToPin(d){
    const p = projectLive(d);
    const inFrame = p && p[0] > 80 && p[0] < 920 && p[1] > 60 && p[1] < 500;
    if (inFrame) return;                     // already on screen, no pan needed
    if (_flyToPinRaf) cancelAnimationFrame(_flyToPinRaf);
    const startRot = [...view.rotate];
    const targetRot = [-d.lon, -d.lat, 0];
    const t0 = performance.now();
    const duration = 420;                    // snappy, not cinematic
    function step(now){
      const t = Math.min(1, (now - t0) / duration);
      const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
      view.rotate[0] = startRot[0] + (targetRot[0] - startRot[0]) * e;
      view.rotate[1] = startRot[1] + (targetRot[1] - startRot[1]) * e;
      projection.rotate(view.rotate);
      redrawRaf();
      if (t < 1) _flyToPinRaf = requestAnimationFrame(step);
      else _flyToPinRaf = null;
    }
    _flyToPinRaf = requestAnimationFrame(step);
  }
  function ensureKbdHint(){
    if (document.querySelector('.kbd-hint')) return;
    const el = document.createElement('div');
    el.className = 'kbd-hint';
    el.textContent = '← ↑ ↓ →  cycle nearby  ·  Esc  dismiss';
    document.body.appendChild(el);
  }
  ensureKbdHint();
  function kbdClearVisual(){
    document.querySelectorAll('.marker.kbd-focus').forEach(el => el.classList.remove('kbd-focus'));
  }
  // v45.m — kbdSelect now optionally opens the bottom-sheet automatically,
  // so the arrow-key cycle feels like clicking each neighbour in turn.
  function kbdSelect(marker, openSheet){
    kbdClearVisual();
    if (!marker) {
      _kbdSelected = null;
      setHoveredPicked(null);
      hideTip();
      return;
    }
    if (marker._el) marker._el.classList.add('kbd-focus');
    _kbdSelected = marker;
    setHoveredPicked(marker);
    const rect = svg.getBoundingClientRect();
    const scrScale = Math.min(rect.width / 1000, rect.height / 560);
    const offX = (rect.width - 1000 * scrScale) / 2;
    const offY = (rect.height -  560 * scrScale) / 2;
    const fakeEvt = {
      clientX: rect.left + offX + marker._x * scrScale,
      clientY: rect.top  + offY + marker._y * scrScale
    };
    if (openSheet) {
      // v45.o — if the pin is currently off-screen (high zoom edge or back
      // of globe), pan to centre it BEFORE opening the sheet, so the user
      // sees what they just selected.
      try { flyToPin(marker); } catch(_) {}
      // Full route: opens bottom-sheet (mobile + desktop), also drives the tip.
      routePickedMarker(marker, fakeEvt);
    } else {
      showTip(marker, fakeEvt);
    }
  }
  // v45.m — directional, map-location-linked navigation. Pressing ← moves to
  // the closest pin to the LEFT of the current one, → moves right, ↑ up,
  // ↓ down — snake-like through the local cluster. Auto-opens the sheet
  // for each selected pin so the cycle feels like clicking each neighbour.
  function kbdMove(direction){
    const anchor = _hoveredPicked;
    if (!anchor) return;
    const next = spatialPick(anchor, direction);
    if (!next || next === anchor) return;
    kbdSelect(next, /* openSheet = */ true);
  }
  document.addEventListener('keydown', (e) => {
    const tag = e.target && e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
    // v45.m — arrows ONLY act when a pin is currently selected.
    // Otherwise the browser handles them as usual (page scroll, focus, etc.).
    // No map rotation on arrows — drag the globe to pan.
    if (!_hoveredPicked) {
      // Only Esc still has any effect when nothing is selected.
      return;
    }
    if (e.key === 'ArrowRight') { e.preventDefault(); kbdMove('right'); }
    else if (e.key === 'ArrowLeft')  { e.preventDefault(); kbdMove('left');  }
    else if (e.key === 'ArrowUp')    { e.preventDefault(); kbdMove('up');    }
    else if (e.key === 'ArrowDown')  { e.preventDefault(); kbdMove('down');  }
    else if (e.key === 'Escape')     { kbdSelect(null); hideTip(); }
    else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const scrScale = Math.min(rect.width / 1000, rect.height / 560);
      const offX = (rect.width - 1000 * scrScale) / 2;
      const offY = (rect.height -  560 * scrScale) / 2;
      routePickedMarker(_hoveredPicked, {
        clientX: rect.left + offX + _hoveredPicked._x * scrScale,
        clientY: rect.top  + offY + _hoveredPicked._y * scrScale
      });
    }
  });
  // Mouse interaction with a DIFFERENT marker clears the kbd selection.
  svg.addEventListener('pointermove', () => {
    if (_kbdSelected && _hoveredPicked && _hoveredPicked !== _kbdSelected) {
      kbdClearVisual();
      _kbdSelected = null;
    }
  });

  // Belt + suspenders: on touchstart on empty map, also dismiss (handles iOS quirks where click fires late)
  svg.addEventListener('touchstart', (e) => {
    if (!e.target.closest('.marker') && e.touches.length === 1) {
      const t = e.touches[0];
      const touchPoint = { clientX: t.clientX, clientY: t.clientY, type: 'touchstart' };
      if (pickMarkerFromEvent(touchPoint, pickRadiusForEvent(touchPoint))) return;
      // Don't hide while user is mid-drag; only on initial single touch
      // The click handler above also fires, but this is faster on iOS
      hideTip();
    }
  }, { passive: true });


  // v45.e — Google-Maps-style cursor-anchored wheel zoom. Each wheel event
  // both changes the scale AND rotates the globe so that the lat/lon under
  // the cursor stays under the cursor. Iterative compensation (4 passes) is
  // enough for orthographic at any zoom.
  function zoomAnchored(svgX, svgY, factor){
    const inv = (projection.invert && projection.invert([svgX, svgY])) || null;
    // v45.aj — guard the input invert against NaN. iOS Safari pinch
    // sometimes invokes zoomAnchored with anchor coordinates that
    // project to a degenerate inverse on a globe-limb intersection.
    if (inv && (isNaN(inv[0]) || isNaN(inv[1]))) {
      view.scale = clampScale(view.scale * factor);
      projection.scale(view.scale);
      return;
    }
    const newScale = clampScale(view.scale * factor);
    view.scale = newScale;
    projection.scale(newScale);
    if (inv) {
      // Snapshot rotation so we can roll back if iteration corrupts it.
      const safeRot = [view.rotate[0], view.rotate[1], view.rotate[2] || 0];
      for (let i = 0; i < 5; i++) {
        const cur = projection(inv);
        // v45.aj — catch NaN explicitly. d3 orthographic CAN return
        // [NaN, NaN] (not null) on extreme limb projections, which let
        // NaN propagate into view.rotate and broke every subsequent
        // redraw until other code paths reset rotate.
        if (!cur || isNaN(cur[0]) || isNaN(cur[1])) break;
        const dx = cur[0] - svgX;
        const dy = cur[1] - svgY;
        if (dx*dx + dy*dy < 0.25) break;
        const k = view.scale / BASE_SCALE;
        const cosPhi = Math.max(0.18, Math.cos(view.rotate[1] * Math.PI / 180));
        // SVG-units → degrees, scaled inversely by zoom
        const degPerUnit = (180 / Math.PI) / (BASE_SCALE * k);
        const dLam = dx * degPerUnit / cosPhi;
        const dPhi = dy * degPerUnit;
        if (isNaN(dLam) || isNaN(dPhi)) {
          // Roll back any partial corruption from this iteration.
          view.rotate[0] = safeRot[0];
          view.rotate[1] = safeRot[1];
          projection.rotate(view.rotate);
          break;
        }
        // Move the centre TOWARD the cursor's lat/lon to bring it back.
        view.rotate[0] -= dLam;
        view.rotate[1] = Math.max(-89, Math.min(89, view.rotate[1] + dPhi));
        projection.rotate(view.rotate);
      }
      // Final post-loop sanity check.
      if (isNaN(view.rotate[0]) || isNaN(view.rotate[1])) {
        view.rotate[0] = safeRot[0];
        view.rotate[1] = safeRot[1];
        projection.rotate(view.rotate);
      }
    }
  }

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomCoastVel = 0;
    // Cancel any pending target-scale animation; we're driving view.scale directly.
    if (targetScale != null) targetScale = null;
    if (zoomAnimRaf) { cancelAnimationFrame(zoomAnimRaf); zoomAnimRaf = null; }
    const rect = svg.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (1000 / rect.width);
    const sy = (e.clientY - rect.top)  * (560  / rect.height);
    // Per-tick magnitude. v45.v — Android Chrome reports much larger deltaY
    // per pinch tick than desktop wheels; halved the multiplier 0.0055 →
    // 0.0025 so a single tick is ~22% zoom change instead of ~56%. Desktop
    // wheel-mouse users get slightly slower zoom but still responsive.
    const factor = Math.exp(-e.deltaY * 0.0025);
    zoomAnchored(sx, sy, factor);
    zHint.classList.add('fade');
    redrawRaf();
  }, { passive: false });

  // Double-click to zoom in toward clicked point
  svg.addEventListener('dblclick', (e) => {
    const rect = svg.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * (1000 / rect.width);
    const sy = (e.clientY - rect.top) * (560 / rect.height);
    const inv = projection.invert && projection.invert([sx, sy]);
    if(inv){
      view.rotate[0] = -inv[0];
      view.rotate[1] = -inv[1];
    }
    zoomBy(1.8);
    zHint.classList.add('fade');
  });

  // Animated flyTo — zoom-out arc then zoom-in to destination
  const REGIONS = {
    eu: { rotate: [-5, -50, 0], scale: BASE_SCALE * 5.5 },
    us: { rotate: [95, -40, 0],  scale: BASE_SCALE * 4.0 },
    ea: { rotate: [-120, -35, 0], scale: BASE_SCALE * 4.0 },
  };

  let flyAnim = null;
  function flyTo(region) {
    const target = REGIONS[region];
    if (!target) return;
    if (flyAnim) cancelAnimationFrame(flyAnim);

    const start = { rotate: [...view.rotate], scale: view.scale };
    const t0 = performance.now();

    // Compute angular distance to decide if we need the zoom-out arc
    const dLon = Math.abs(target.rotate[0] - start.rotate[0]);
    const dLat = Math.abs(target.rotate[1] - start.rotate[1]);
    const angularDist = Math.sqrt(dLon * dLon + dLat * dLat);
    const needsArc = angularDist > 20; // significant rotation → zoom out first

    // Zoom-out trough: pull back to global view mid-flight
    const midScale = needsArc ? BASE_SCALE * 1.0 : (start.scale + target.scale) / 2;
    const duration = needsArc ? 1400 : 800; // longer for cross-globe flights

    // Highlight active button
    document.querySelectorAll('.region-nav button').forEach(b => b.classList.remove('active-region'));
    const btn = document.getElementById('r-' + region);
    if (btn) btn.classList.add('active-region');
    zHint.classList.add('fade');

    function step(now) {
      const t = Math.min(1, (now - t0) / duration);
      // Ease in-out cubic for rotation
      const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

      // Rotation: smooth interpolation
      view.rotate[0] = start.rotate[0] + (target.rotate[0] - start.rotate[0]) * e;
      view.rotate[1] = start.rotate[1] + (target.rotate[1] - start.rotate[1]) * e;
      view.rotate[2] = start.rotate[2] + ((target.rotate[2] || 0) - start.rotate[2]) * e;

      // Scale: parabolic arc — dip to midScale at t=0.5, arrive at target.scale at t=1
      // s(t) = (1-t)^2 * start + 2*(1-t)*t * mid + t^2 * target  (quadratic Bezier)
      const s0 = start.scale, s1 = midScale, s2 = target.scale;
      const oneMinusT = 1 - t;
      view.scale = oneMinusT * oneMinusT * s0 + 2 * oneMinusT * t * s1 + t * t * s2;

      redraw();

      if (t < 1) flyAnim = requestAnimationFrame(step);
      else flyAnim = null;
    }
    flyAnim = requestAnimationFrame(step);
  }

  // Region buttons
  document.getElementById('r-eu').onclick = () => flyTo('eu');
  document.getElementById('r-us').onclick = () => flyTo('us');
  document.getElementById('r-ea').onclick = () => flyTo('ea');

  // Buttons
  document.getElementById('z-in').onclick  = () => { zoomBy(1.6); zHint.classList.add('fade'); };
  document.getElementById('z-out').onclick = () => { zoomBy(1/1.6); };
  document.getElementById('z-reset').onclick = () => { flyTo('eu'); };

  // Keyboard — v45.l: arrows are reserved for the pin-cycle keyboard handler
  // (see v45.k). Map rotation via arrows is removed; users pan with drag.
  window.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if(e.key === '+' || e.key === '=') zoomBy(1.4);
    else if(e.key === '-' || e.key === '_') zoomBy(1/1.4);
    else if(e.key === '0'){ flyTo('eu'); }
  });

  svg.style.cursor = 'grab';
  redraw();
  render();
})();

(function setupMobileDrawers(){
  const body = document.body;
  const left = document.querySelector('aside.left');
  const right = document.querySelector('aside.right');
  const backdrop = document.getElementById('drawer-backdrop');
  const btnFilters = document.getElementById('mob-filters');
  const btnSelected = document.getElementById('mob-selected');
  if (!left || !right || !btnFilters || !btnSelected) return;

  // v45.d — each side toggles INDEPENDENTLY. Both can be open at the same
  // time; map auto-shrinks via the grid layout.
  function syncBodyClasses(){
    body.classList.toggle('left-open',  left.classList.contains('open'));
    body.classList.toggle('right-open', right.classList.contains('open'));
  }
  function closeLeft(){  left.classList.remove('open');  syncBodyClasses(); }
  function closeRight(){ right.classList.remove('open'); syncBodyClasses(); }
  function closeAll(){   closeLeft(); closeRight(); }
  function openLeft(){
    left.classList.add('open');
    if (!left.querySelector('.drawer-close')) addCloseButton(left, closeLeft);
    syncBodyClasses();
  }
  function openRight(){
    right.classList.add('open');
    if (!right.querySelector('.drawer-close')) addCloseButton(right, closeRight);
    syncBodyClasses();
  }
  function toggleLeft(){
    if (left.classList.contains('open')) closeLeft(); else openLeft();
  }
  function toggleRight(){
    if (right.classList.contains('open')) closeRight(); else openRight();
  }
  function addCloseButton(el, fn){
    const btn = document.createElement('button');
    btn.className = 'drawer-close';
    btn.innerHTML = '×';
    btn.setAttribute('aria-label', 'Close');
    btn.addEventListener('click', fn);
    el.appendChild(btn);
  }
  // v45.e — the document-level openDrawer handler (defined further down) is
  // the authoritative click path. We don't bind toggleLeft/toggleRight to
  // the buttons here, to avoid double-fire. ESC handled by openDrawer block.

  // v45.h kbd code moved to the main IIFE (was being shadowed by an early-
  // return in setupMobileDrawers when the DOM wasn't ready). See marker
  // setup section for the active code path.

  // Update badge count for selected (looks at active filter chips)
  function updateBadge(){
    const badge = document.getElementById('mob-selected-n');
    if (!badge) return;
    const activeCount = document.querySelectorAll('.chip.active').length || 0;
    badge.textContent = activeCount;
    badge.style.display = activeCount > 0 ? 'inline-block' : 'none';
  }
  updateBadge();
  // Re-check on any chip click
  document.addEventListener('click', (e) => {
    if (e.target.closest('.chip')) setTimeout(updateBadge, 50);
  });
})();



/* ============ TOUCH GESTURES (added 2026-05-28) ============ */
(function setupTouchGestures(){
  if (window.matchMedia('(min-width: 768px)').matches) return;  // desktop/tablet grid only
  const body = document.body;
  const left = document.querySelector('aside.left');
  const right = document.querySelector('aside.right');
  if (!left || !right) return;

  const EDGE_PX = 28;          // px from edge to detect open-from-edge swipe
  const MIN_DIST = 40;         // px minimum swipe distance to trigger
  const MAX_OFF_AXIS = 50;     // max vertical drift allowed
  const EDGE_HEIGHT_RATIO = 0.85;  // only top 85% of screen detects edge-swipes (avoid footer)

  let startX = null, startY = null, startEdge = null;

  function handleStart(e){
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    const fromLeftEdge = t.clientX < EDGE_PX;
    const fromRightEdge = t.clientX > window.innerWidth - EDGE_PX;
    const inUpperBand = t.clientY < window.innerHeight * EDGE_HEIGHT_RATIO;
    if (fromLeftEdge && inUpperBand) startEdge = 'left';
    else if (fromRightEdge && inUpperBand) startEdge = 'right';
    else startEdge = null;
  }
  function handleEnd(e){
    if (startX === null) return;
    const t = (e.changedTouches && e.changedTouches[0]);
    if (!t) { startX = null; return; }
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (absDy > MAX_OFF_AXIS || absDx < MIN_DIST) { startX = null; return; }

    // Swipe from left edge to the right: open Filters
    if (startEdge === 'left' && dx > 0) {
      document.getElementById('mob-filters')?.click();
    }
    // Swipe from right edge to the left: open Selected
    else if (startEdge === 'right' && dx < 0) {
      document.getElementById('mob-selected')?.click();
    }
    // Swipe LEFT while left drawer is open: close it
    else if (left.classList.contains('open') && dx < 0) {
      left.classList.remove('open');
      body.classList.remove('drawer-open');
    }
    // Swipe RIGHT while right drawer is open: close it
    else if (right.classList.contains('open') && dx > 0) {
      right.classList.remove('open');
      body.classList.remove('drawer-open');
    }
    startX = null;
  }
  // Touch edge swipes open/close the same overlay drawers used by the buttons.
  document.addEventListener('touchstart', handleStart, { passive: true });
  document.addEventListener('touchend', handleEnd, { passive: true });
})();



/* ============ MAPS-APP BOTTOM SHEET (mobile v11+v15) ============ */
// Retry until the async innerHTML render has placed the sheet div in DOM.
// (Earlier v11 ran synchronously before the async init completed, found null,
//  and silently early-returned — leaving window.__sheet undefined.)
(function waitForSheet(tries){
  const sheet = document.getElementById('sdl-sheet');
  const body = document.getElementById('sheet-body');
  if (!sheet || !body) {
    if (tries < 50) setTimeout(() => waitForSheet(tries + 1), 60);
    else console.warn('[bc-mobile] sheet element never appeared');
    return;
  }
  setupBottomSheet();
})(0);

function setupBottomSheet(){
  const sheet = document.getElementById('sdl-sheet');
  const body = document.getElementById('sheet-body');
  const closeBtn = document.getElementById('sheet-close');
  const backdrop = document.getElementById('drawer-backdrop');
  if (!sheet || !body) return;

  function isMobile(){ return window.matchMedia('(max-width: 900px)').matches; }

  function openSheet(d){
    // v35: card now opens on both desktop and mobile (was mobile-only).
    // CSS handles the layout switch — bottom-sheet on ≤900px, right-side card on >900px.
    const CATS = window.SDL_CATEGORIES;
    const tierLabel = CATS.tier.options.find(o => o.id === d.tier)?.label || d.tier;
    const matLabel = CATS.maturity.options.find(o => o.id === d.maturity)?.label || d.maturity;
    const domLabel = CATS.domain.options.find(o => o.id === d.domain)?.label || d.domain;
    const chLabel = CATS.charact.options.find(o => o.id === d.charact)?.label || d.charact;
    const tierColor = getComputedStyle(document.documentElement).getPropertyValue('--c-' + d.tier).trim() || '#888';

    // v35: build link section. Homepage = primary "verify the org" link.
    // Sources = founding paper / press release / official announcement.
    function hostOf(u){ try { return new URL(u).hostname.replace(/^www\./,''); } catch { return u; } }
    let linksHtml = '';
    const hasHome = d.url && d.url.length > 0;
    const hasSrc  = Array.isArray(d.sources) && d.sources.length > 0;
    if (hasHome || hasSrc) {
      linksHtml = '<div class="sheet-links">';
      if (hasHome) {
        linksHtml += `<span class="lbl">Visit</span>`;
        linksHtml += `<a class="homepage" href="${d.url}" target="_blank" rel="noopener noreferrer">${hostOf(d.url)}</a>`;
      }
      if (hasSrc) {
        linksHtml += `<span class="lbl">Sources / references</span>`;
        linksHtml += '<ul class="sources">';
        d.sources.forEach(s => {
          linksHtml += `<li><a href="${s}" target="_blank" rel="noopener noreferrer">${hostOf(s)}</a></li>`;
        });
        linksHtml += '</ul>';
      }
      linksHtml += '<div class="note">Links open in a new tab so you can verify each entry against its primary source.</div>';
      linksHtml += '</div>';
    }

    body.innerHTML = `
      <div class="sheet-head">
        <span class="s-dot" style="background:${tierColor}"></span>
        <span class="s-name" id="sheet-name">${d.flag || ''} ${d.name}</span>
      </div>
      <div class="sheet-meta">${tierLabel} · ${d.city}, ${d.country}</div>
      <div class="sheet-row"><span class="k">Org</span><span class="v">${d.org || '—'}</span></div>
      <div class="sheet-row"><span class="k">Domain</span><span class="v">${domLabel}</span></div>
      <div class="sheet-row"><span class="k">Maturity</span><span class="v">${matLabel}</span></div>
      <div class="sheet-row"><span class="k">Characterisation</span><span class="v">${chLabel}</span></div>
      <div class="sheet-row"><span class="k">AI</span><span class="v">${d.ai || '—'}</span></div>
      <div class="sheet-row"><span class="k">Scale</span><span class="v">${d.scale || '—'}</span></div>
      <div class="sheet-row"><span class="k">Investment</span><span class="v">${d.investLabel || '—'}</span></div>
      ${linksHtml}
    `;
    sheet.style.transform = '';   // clear any stuck inline transform from prior swipe
    sheet.classList.add('open');
    document.body.classList.add('sheet-open');
    // Mark the selected marker
    document.querySelectorAll('.marker.selected').forEach(m => m.classList.remove('selected'));
    const markerEl = document.querySelector(`.marker[data-id="${d.id}"]`);
    if (markerEl) markerEl.classList.add('selected');
  }
  function closeSheet(){
    sheet.classList.remove('open');
    document.body.classList.remove('sheet-open');
    document.querySelectorAll('.marker.selected').forEach(m => m.classList.remove('selected'));
  }

  closeBtn?.addEventListener('click', closeSheet);
  backdrop?.addEventListener('click', closeSheet);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

  // Swipe-down on sheet to dismiss
  let touchStartY = null;
  let touchStartScroll = 0;
  sheet.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    touchStartY = e.touches[0].clientY;
    touchStartScroll = sheet.scrollTop;
  }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    if (touchStartY === null) return;
    // Only allow swipe-down dismissal if sheet is scrolled to top
    if (sheet.scrollTop > 0) return;
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 0) {
      sheet.style.transform = `translateY(${dy}px)`;
    }
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (touchStartY === null) return;
    const dy = (e.changedTouches[0]?.clientY ?? touchStartY) - touchStartY;
    sheet.style.transform = '';   // remove inline
    if (sheet.scrollTop === 0 && dy > 80) closeSheet();
    touchStartY = null;
  }, { passive: true });

  // v35: card opens on click — works on both desktop and mobile.
  // The CSS @media rules position it as a bottom-sheet (≤900px) or
  // right-side card (>900px) but the open/close logic is shared.
  document.addEventListener('click', e => {
    // Don't intercept clicks on the card itself (links etc.)
    if (e.target.closest('#sdl-sheet')) return;
    const m = e.target.closest('.marker');
    if (m) {
      const id = m.getAttribute('data-id');
      if (!id) return;
      const d = window.SDL_DATA.find(x => x.id === id);
      if (d) openSheet(d);
      return;
    }
    // Click outside any pin closes the card (Maps-like behaviour).
    // Skip if click is on a UI control (zoom, region nav, filter chip).
    if (e.target.closest('.zoom-ctl, .region-nav, aside, header, footer, .menu-btn, button')) return;
    if (document.body.classList.contains('sheet-open')) closeSheet();
  });

  // Hide the desktop tip immediately on mobile so it doesn't flash
  if (isMobile()) {
    const tip = document.querySelector('.tip');
    if (tip) tip.style.display = 'none';
  }
  // Expose for debugging
  window.__sheet = { openSheet, closeSheet };
  console.log('[bc-mobile] setupBottomSheet ready, window.__sheet set');
}


/* ============ MOBILE v12 — defensive button bindings + smooth zoom ============ */
(function setupV12(){
  // === 1. Defensive event delegation for drawer toggle buttons ===
  // Works even if earlier IIFE failed to find the buttons at script-load time
  function getDrawers(){
    return {
      left:  document.querySelector('aside.left'),
      right: document.querySelector('aside.right'),
      back:  document.getElementById('drawer-backdrop')
    };
  }
  function closeAllDrawers(){
    const {left, right, back} = getDrawers();
    left?.classList.remove('open');
    right?.classList.remove('open');
    document.body.classList.remove('drawer-open');
    document.body.classList.remove('left-open');
    document.body.classList.remove('right-open');
    if (back) back.style.display = '';  // clear any stale inline display
  }
  // v45.e — desktop allows both sides open simultaneously; mobile keeps the
  // single-drawer pattern (one closes when the other opens).
  function openDrawer(side){
    const {left, right, back} = getDrawers();
    const isMobile = window.matchMedia('(max-width: 900px)').matches;
    if (isMobile) closeAllDrawers();
    const el = side === 'left' ? left : right;
    if (!el) return;
    if (el.classList.contains('open')) {
      el.classList.remove('open');
      document.body.classList.remove(side === 'left' ? 'left-open' : 'right-open');
      if (!document.body.classList.contains('left-open') && !document.body.classList.contains('right-open')) {
        document.body.classList.remove('drawer-open');
      }
      return;
    }
    el.classList.add('open');
    document.body.classList.add('drawer-open');
    document.body.classList.add(side === 'left' ? 'left-open' : 'right-open');
    // backdrop visibility is handled via CSS (body.drawer-open .drawer-backdrop {display:block})
    // Add a close × button to the drawer if not already present
    if (!el.querySelector('.drawer-close')) {
      const btn = document.createElement('button');
      btn.className = 'drawer-close';
      btn.innerHTML = '×';
      btn.setAttribute('aria-label', 'Close');
      btn.addEventListener('click', closeAllDrawers);
      btn.addEventListener('pointerdown', e => { e.stopPropagation(); }, {passive: true});
      el.appendChild(btn);
    }
  }
  // Use BOTH pointerdown (faster on iOS) AND click (universal) so taps register
  // even if iOS suppresses the synthesized click after a missed pointerdown.
  ['pointerdown','click'].forEach(evt => {
    document.addEventListener(evt, e => {
      const t = e.target.closest('#mob-filters, #mob-selected, .drawer-close, .drawer-backdrop');
      if (!t) return;
      e.preventDefault();
      e.stopPropagation();
      if (t.id === 'mob-filters') openDrawer('left');
      else if (t.id === 'mob-selected') openDrawer('right');
      else if (t.classList.contains('drawer-close') || t.classList.contains('drawer-backdrop')) closeAllDrawers();
    }, { passive: false });
  });
  // Visible-debug: tap any button briefly flashes its background — user can confirm tap detected
  document.addEventListener('pointerdown', e => {
    const t = e.target.closest('#mob-filters, #mob-selected');
    if (!t) return;
    t.style.background = 'rgba(255,255,255,0.2)';
    setTimeout(() => { t.style.background = ''; }, 180);
  }, { passive: true });

  // === 2. Smooth-animated zoom for +/− buttons (Maps-app feel) ===
  let zoomAnimId = null;
  function smoothZoom(factor, durationMs){
    cancelAnimationFrame(zoomAnimId);
    durationMs = durationMs || 260;
    const startScale = view.scale;
    const targetScale = clampScale(startScale * factor);
    const t0 = performance.now();
    function step(){
      const t = (performance.now() - t0) / durationMs;
      if (t >= 1) {
        view.scale = targetScale;
        document.body.classList.remove('interacting');
        redraw();   // redraw AFTER removing class so labels update with showLabels=true
        zoomAnimId = null;
        return;
      }
      // Ease-out cubic
      const e = 1 - Math.pow(1 - t, 3);
      view.scale = startScale + (targetScale - startScale) * e;
      redraw();
      zoomAnimId = requestAnimationFrame(step);
    }
    document.body.classList.add('interacting');
    zoomAnimId = requestAnimationFrame(step);
  }
  // Override the +/− button onclick to use smoothZoom
  const zIn  = document.getElementById('z-in');
  const zOut = document.getElementById('z-out');
  if (zIn)  zIn.onclick  = () => smoothZoom(1.7, 260);
  if (zOut) zOut.onclick = () => smoothZoom(1/1.7, 260);

  // === 3. Double-tap to zoom in (Maps-app classic) ===
  // Uses local pointer tracking; doesn't depend on the drag IIFE's `pointers`
  function attachDoubletapZoom(){
    const svg = document.getElementById('map');
    if (!svg) return;
    let lastTapTime = 0;
    let lastTapX = 0, lastTapY = 0;
    const tapPointers = new Map();   // local — independent of drag IIFE
    svg.addEventListener('pointerdown', e => {
      tapPointers.set(e.pointerId, {x: e.clientX, y: e.clientY, t: performance.now()});
      if (e.pointerType !== 'touch' && e.pointerType !== 'pen') return;
      if (e.target.closest('.marker')) return;
      const now = performance.now();
      const dx = Math.abs(e.clientX - lastTapX);
      const dy = Math.abs(e.clientY - lastTapY);
      if (now - lastTapTime < 320 && dx < 30 && dy < 30 && tapPointers.size === 1) {
        // Double-tap detected → zoom in 1.8× toward tap point
        const rect = svg.getBoundingClientRect();
        const sx = (e.clientX - rect.left) * (1000 / rect.width);
        const sy = (e.clientY - rect.top)  * (560  / rect.height);
        try {
          const inv = projection.invert && projection.invert([sx, sy]);
          if (inv) {
            view.rotate[0] = -inv[0];
            view.rotate[1] = -inv[1];
          }
        } catch(_) {}
        smoothZoom(1.8, 300);
        lastTapTime = 0;
      } else {
        lastTapTime = now;
        lastTapX = e.clientX;
        lastTapY = e.clientY;
      }
    });
    function pointerEnd(e){
      const start = tapPointers.get(e.pointerId);
      tapPointers.delete(e.pointerId);
      if (!start) return;
      // Two-finger tap-out detection: if 2 pointers came down briefly, then both released without moving much
      const dur = performance.now() - start.t;
      const moved = e.clientX != null ? Math.hypot(e.clientX - start.x, e.clientY - start.y) : 0;
      if (tapPointers.size === 1 && dur < 280 && moved < 18) {
        // The OTHER pointer just released after a short two-finger tap → zoom out
        const other = tapPointers.values().next().value;
        if (other && performance.now() - other.t < 320) {
          smoothZoom(1/1.8, 280);
          tapPointers.clear();   // consume
        }
      }
    }
    svg.addEventListener('pointerup', pointerEnd);
    svg.addEventListener('pointercancel', e => { tapPointers.delete(e.pointerId); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attachDoubletapZoom);
  } else {
    attachDoubletapZoom();
  }
})();

/* v45 — theme toggle (dark default, light opt-in, persisted to localStorage). */
window.__themeIIFE = 'started';
(function(){
  function applyTheme(t){
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else document.documentElement.removeAttribute('data-theme');
    // Canvas captures CSS vars once; refresh + redraw on theme change.
    if (window.__sdlRefreshTheme) { try { window.__sdlRefreshTheme(); } catch(e){} }
    if (window.redrawRaf) { try { window.redrawRaf(); } catch(e){} }
  }
  // v45.d — default to LIGHT theme on first load (was: dark). User-toggled
  // preference still wins (persisted in localStorage).
  try {
    const saved = localStorage.getItem('sdl-map-theme');
    if (saved === 'light' || saved === 'dark') {
      applyTheme(saved);
    } else {
      applyTheme('light');
    }
  } catch(e){
    applyTheme('light');
  }
  function wire(){
    const btn = document.getElementById('theme-toggle');
    if (!btn) return false;
    if (btn.dataset.themeWired) return true;
    btn.dataset.themeWired = '1';
    window.__themeIIFE = 'wired';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const next = isLight ? 'dark' : 'light';
      applyTheme(next);
      try { localStorage.setItem('sdl-map-theme', next); } catch(e){}
    });
    return true;
  }
  // The main script is async (awaits world-atlas + china geo fetches) so DOM
  // can land after this IIFE runs. Poll for up to 10s. Cheap, no observer.
  let _tries = 0;
  function tryWire(){
    if (wire()) return;
    if (++_tries > 100) return;          // 100 × 100ms = 10s
    setTimeout(tryWire, 100);
  }
  tryWire();
})();


/* v13 SAFETY: body.interacting class can never stay on for more than 2s
   without an active touch — guards against stuck-class bugs */
(function () {
  let lastActivity = 0;
  document.addEventListener('pointerdown', () => { lastActivity = performance.now(); }, { passive: true });
  document.addEventListener('pointermove', () => { lastActivity = performance.now(); }, { passive: true });
  document.addEventListener('pointerup', () => { lastActivity = performance.now(); }, { passive: true });
  setInterval(() => {
    if (!document.body.classList.contains('interacting')) return;
    if (performance.now() - lastActivity > 2000) {
      document.body.classList.remove('interacting');
    }
  }, 800);
  // Also cancel + clear on visibility-change / blur
  window.addEventListener('blur', () => document.body.classList.remove('interacting'));
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) document.body.classList.remove('interacting');
  });
})();


/* v14 DIAG: short window-attached log for Safari Web Inspector debugging */
window.__bcdebug = {
  log: (...args) => { console.log('[bc-mobile]', ...args); window.__bcdebug.history.push(args); },
  history: []
};
(function () {
  function isMobile(){ return window.matchMedia('(max-width: 900px)').matches; }
  document.addEventListener('click', e => {
    const m = e.target.closest('.marker');
    if (m) {
      window.__bcdebug.log('marker click', m.getAttribute('data-id'), 'isMobile=', isMobile());
      const sheet = document.getElementById('sdl-sheet');
      window.__bcdebug.log('sheet exists=', !!sheet, 'sheet has .open=', sheet?.classList.contains('open'));
    }
  });
})();


/* v20: one-shot pre-warm so the first real touch doesn't pay first-time layer cost.
   Toggles body.interacting once at idle to flush CSS recalc + layer promotion. */
window.requestIdleCallback ? requestIdleCallback(prewarmInteracting, {timeout: 1500}) : setTimeout(prewarmInteracting, 800);
function prewarmInteracting(){
  document.body.classList.add('interacting');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.body.classList.remove('interacting');
    });
  });
}


/* v45.n — Safari gesture guard: only block page-level gestures OUTSIDE the
   map and the bottom-sheet. Earlier versions blocked gesturestart and
   touchend globally, which Safari treats as a hint to also suppress the
   synthesised click after a touchend — so tap-to-select on a pin sometimes
   never reached the marker click handler. The map relies on touch-action:none
   (CSS, line 317) + its own touch handlers; no JS guard needed for it. */
(function gestureGuard(){
  const scrollableSel = 'aside.left, aside.right, .sheet, .sheet-body';
  const mapSel = '#map, svg#map, .marker, .sdl-label';
  function insideMap(target){
    return !!(target && target.closest && target.closest(mapSel));
  }
  document.addEventListener('touchmove', e => {
    if (e.target.closest(scrollableSel)) return;   // let panels/sheet scroll
    if (insideMap(e.target)) return;               // map owns its own gestures
    e.preventDefault();
  }, { passive: false, capture: true });
  // Page-level Safari pinch zoom blocker — never fire inside the map.
  // (The map has touch-action:none + multi-touch logic of its own.)
  ['gesturestart','gesturechange','gestureend'].forEach(name => {
    document.addEventListener(name, e => {
      if (insideMap(e.target)) return;
      e.preventDefault();
    }, { passive: false });
  });
  // Page-level double-tap-zoom blocker — never preventDefault inside the map.
  // Safari: preventDefault on touchend suppresses the trailing click, which
  // was eating fast successive pin taps. The map handles its own double-tap
  // logic (see tapPointers around line 3907).
  let lastTap = 0;
  document.addEventListener('touchend', e => {
    if (insideMap(e.target)) return;
    const now = performance.now();
    if (now - lastTap < 320) e.preventDefault();
    lastTap = now;
  }, { passive: false });
})();


/* v28: ensure SDL labels reflect current zoom state. When body.interacting
   flips from on→off via any code path, schedule one extra redraw. */
(function ensureLabelsAfterInteraction(){
  let lastState = document.body.classList.contains('interacting');
  const observer = new MutationObserver(() => {
    const now = document.body.classList.contains('interacting');
    if (lastState && !now) {
      // transitioned off — force redraw
      if (typeof redrawRaf === 'function') redrawRaf();
      else if (window.redrawRaf) window.redrawRaf();
    }
    lastState = now;
  });
  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
})();
